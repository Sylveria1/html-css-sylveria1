<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainy Days | Home</title>
    <meta
      name="description"
      content="Durable rain jackets built for every adventure."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header>
        <nav class="nav">
          <a href="index.html">
            <img
              src="images/RainyDays_Logo.png"
              class="logo"
              alt="Rainy Days Logo"
            />
          </a>

          <div class="nav-icons">
            <a href="cart.html" aria-label="Shopping cart">
              <svg viewBox="0 0 24 24">
                <path
                  d="M3 3h2l2.5 10h10l2-7H6"
                  stroke="black"
                  stroke-width="2"
                  fill="none"
                />
                <circle cx="9" cy="20" r="1.5" fill="black" />
                <circle cx="17" cy="20" r="1.5" fill="black" />
              </svg>
            </a>

            <a href="coming-soon.html" aria-label="User profile">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4" stroke="black" stroke-width="2" />
                <path d="M4 20c2-4 14-4 16 0" stroke="black" stroke-width="2" />
              </svg>
            </a>
          </div>
        </nav>
      </header>

      <main>
        <section class="hero">
          <div class="hero-content">
            <h1>Pushing the Comfort Zone</h1>
            <p>Durable rain jackets built for every adventure.</p>
            <a href="products.html" class="btn">Shop Now</a>
          </div>
        </section>
        <section class="featured">
          <div>
            <h2>Featured Jackets test</h2>

            <div class="products-grid">
              <a href="product.html" class="product-item">
                <article class="product-card">
                  <div class="product-image">
                    <img
                      src="images/Fancy.jpg"
                      alt="Orange and gray heavy-duty rain jacket"
                    />
                  </div>
                  <h3>Fancy Jacket</h3>
                </article>
              </a>

              <a href="product.html" class="product-item">
                <article class="product-card">
                  <div class="product-image">
                    <img
                      src="images/Cool.jpg"
                      alt="Black sporty rain jacket with white details"
                    />
                  </div>
                  <h3>Cool Jacket</h3>
                </article>
              </a>

              <a href="product.html" class="product-item">
                <article class="product-card">
                  <div class="product-image">
                    <img
                      src="images/Green.jpg"
                      alt="Green fleece-style jacket"
                    />
                  </div>
                  <h3>Green Jacket</h3>
                </article>
              </a>

              <a href="product.html" class="product-item">
                <article class="product-card">
                  <div class="product-image">
                    <img
                      src="images/Gray.jpg"
                      alt="Gray lightweight rain jacket"
                    />
                  </div>
                  <h3>Gray Jacket</h3>
                </article>
              </a>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <h2>Contact</h2>
        <h2>Socials</h2>
      </footer>
    </div>
  </body>
</html>
