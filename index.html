<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainy Days | Home</title>
    <meta
      name="description"
      content="Durable rain jackets built for every adventure."
    />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page-wrapper">
    <header>
      <nav class="nav">
        <img
          src="images/RainyDays_Logo.png"
          class="logo"
          alt="Rainy Days Logo"

        <div class="nav-icons">
          <a href="cart.html">Cart</a>
          <a href="coming-soon.html">Profile</a>
        </div>
      </nav>

    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>Pushing the Comfort Zone</h1>

          <a href="products.html" class="btn">Shop Now</a>

      </section>
      <section class="featured">
        <div>
          <h2>Featured Jackets</h2>

          <div class="products-grid">
            <article class="product-card">
              <img src="images/fancy.jpg" alt="Fancy Jacket" />

            <article class="product-card">
              <img src="images/cool.jpg" alt="Cool Jacket" />

            </article>

            <article class="product-card">
              <img src="images/green.jpg" alt="Green Jacket" />
              <h3>Green Jacket</h3>
            </article>

            <article class="product-card">
              <img src="images/gray.jpg" alt="Gray Jacket" />

    <footer>
      <p>Contact</p>
